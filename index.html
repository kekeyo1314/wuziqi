<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>五子棋 · 网络对战</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #1a4d4a 0%, #0e3a37 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: #e8d5b5;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            background: #f7f0d9;
            box-shadow: inset 0 0 0 1px #c0a16b, 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            width: 100%;
            height: auto;
        }
        .panel {
            margin-top: 20px;
            background: #fdf3e2;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
        }
        .conn-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #fff0db;
            padding: 8px 15px;
            border-radius: 50px;
        }
        input {
            background: white;
            border: 1px solid #b88b4a;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            width: 140px;
            outline: none;
        }
        button {
            background: #4b6a5f;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
        }
        button:active { transform: scale(0.96); }
        .reset-btn { background: #b97f44; }
        .turn-indicator {
            background: #ffe2b5;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .piece {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .piece.black { background: radial-gradient(#3a3a4a, #111); }
        .piece.white { background: radial-gradient(#f9f9fc, #c0c0d0); }
        .status {
            font-size: 0.9rem;
            font-weight: bold;
            color: #3e2a1a;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5e5ce;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .copy-btn {
            background: #d9b48b;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: bold;
            color: #3e2a1a;
            transition: 0.1s;
        }
        .copy-btn:active { transform: scale(0.92); }
        @media (max-width: 550px) {
            .conn-area { width: 100%; justify-content: center; }
            input { width: 120px; }
            .status { font-size: 0.75rem; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
</head>
<body>
<div class="game-container">
    <canvas id="gobangCanvas" width="600" height="600" style="max-width:600px; width:100%; aspect-ratio:1/1"></canvas>

    <div class="panel">
        <div class="conn-area">
            <input type="text" id="peerIdInput" placeholder="对方ID">
            <button id="connectBtn">🔗 加入</button>
            <button id="createBtn">✨ 创建房间</button>
        </div>
        <button class="reset-btn" id="resetLocalBtn">🔄 重开</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 10px; flex-wrap: wrap;">
        <div class="turn-indicator">
            <div class="piece black" id="turnPiece"></div>
            <span id="turnText">等待连接...</span>
        </div>
        <div class="status" id="connStatus">
            <span id="statusText">⚫ 未连接</span>
            <button id="copyIdBtn" class="copy-btn" style="display: none;">📋 复制ID</button>
        </div>
    </div>
    <div id="infoMsg" style="text-align: center; margin-top: 12px; font-size: 0.8rem; color: #794f1f;"></div>
</div>

<script>
    // ---------- 棋盘逻辑 ----------
    const boardSize = 15;
    let board = Array(boardSize).fill().map(() => Array(boardSize).fill(null));
    let currentPlayer = 'black';
    let gameOver = false;
    let winner = null;
    let historyStack = [];

    let peer = null;
    let conn = null;
    let myId = null;
    let isMyTurn = true;
    let gameStarted = false;
    let myColor = null;
    let opponentColor = null;

    const canvas = document.getElementById('gobangCanvas');
    const ctx = canvas.getContext('2d');
    let cellSize = 0, offsetX = 0, offsetY = 0, radius = 0;

    const turnPiece = document.getElementById('turnPiece');
    const turnText = document.getElementById('turnText');
    const statusTextSpan = document.getElementById('statusText');
    const copyIdBtn = document.getElementById('copyIdBtn');
    const infoMsgDiv = document.getElementById('infoMsg');
    const peerIdInput = document.getElementById('peerIdInput');
    const connectBtn = document.getElementById('connectBtn');
    const createBtn = document.getElementById('createBtn');
    const resetLocalBtn = document.getElementById('resetLocalBtn');

    // 复制房间ID
    function copyRoomId() {
        if (!myId) return;
        navigator.clipboard.writeText(myId).then(() => {
            infoMsgDiv.innerText = '✅ 房间ID已复制！';
            setTimeout(() => { if(infoMsgDiv.innerText === '✅ 房间ID已复制！') infoMsgDiv.innerText = ''; }, 1500);
        }).catch(() => {
            // 降级方案
            const textarea = document.createElement('textarea');
            textarea.value = myId;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            infoMsgDiv.innerText = '✅ 房间ID已复制（手动）';
            setTimeout(() => infoMsgDiv.innerText = '', 1500);
        });
    }

    // 绘制棋盘 (保持原版)
    function drawBoard() {
        if (!ctx) return;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#f7f0d9';
        ctx.fillRect(0, 0, w, h);
        const padding = w * 0.05;
        const available = w - padding * 2;
        cellSize = available / (boardSize - 1);
        radius = Math.min(cellSize * 0.42, w * 0.032);
        offsetX = padding;
        offsetY = padding;

        ctx.beginPath();
        ctx.strokeStyle = '#5f4c2b';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < boardSize; i++) {
            const x = offsetX + i * cellSize;
            ctx.beginPath(); ctx.moveTo(x, offsetY); ctx.lineTo(x, offsetY + (boardSize-1)*cellSize); ctx.stroke();
            const y = offsetY + i * cellSize;
            ctx.beginPath(); ctx.moveTo(offsetX, y); ctx.lineTo(offsetX + (boardSize-1)*cellSize, y); ctx.stroke();
        }
        const starPoints = [[3,3],[11,3],[7,7],[3,11],[11,11]];
        for (let [r,c] of starPoints) {
            const x = offsetX + c*cellSize, y = offsetY + r*cellSize;
            ctx.beginPath(); ctx.arc(x, y, radius*0.65, 0, 2*Math.PI); ctx.fillStyle = '#b35f1a'; ctx.fill();
            ctx.beginPath(); ctx.arc(x, y, radius*0.4, 0, 2*Math.PI); ctx.fillStyle = '#e09d42'; ctx.fill();
        }
        for (let r=0; r<boardSize; r++) {
            for (let c=0; c<boardSize; c++) {
                const val = board[r][c];
                if (!val) continue;
                const cx = offsetX + c*cellSize, cy = offsetY + r*cellSize;
                const grad = ctx.createRadialGradient(cx-3, cy-3, radius*0.2, cx, cy, radius*0.8);
                if (val === 'black') { grad.addColorStop(0,'#2b2b3a'); grad.addColorStop(1,'#111'); }
                else { grad.addColorStop(0,'#fefefe'); grad.addColorStop(1,'#e0e0f0'); }
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 2*Math.PI); ctx.fill();
                ctx.strokeStyle = '#5a4a32'; ctx.lineWidth=0.8; ctx.stroke();
                ctx.beginPath(); ctx.arc(cx-2, cy-2, radius*0.2, 0, 2*Math.PI);
                ctx.fillStyle = val==='black'?'#aaa':'#ffffffc0'; ctx.fill();
            }
        }
    }

    function checkWin(row, col, player) {
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for(let [dx,dy] of dirs){
            let cnt = 1;
            for(let s=1;s<=4;s++){
                const nr = row+dx*s, nc = col+dy*s;
                if(nr<0||nr>=boardSize||nc<0||nc>=boardSize) break;
                if(board[nr][nc]===player) cnt++; else break;
            }
            for(let s=1;s<=4;s++){
                const nr = row-dx*s, nc = col-dy*s;
                if(nr<0||nr>=boardSize||nc<0||nc>=boardSize) break;
                if(board[nr][nc]===player) cnt++; else break;
            }
            if(cnt>=5) return true;
        }
        return false;
    }

    function isDraw() {
        for(let i=0;i<boardSize;i++) for(let j=0;j<boardSize;j++) if(board[i][j]===null) return false;
        return true;
    }

    function updateUI() {
        if(gameOver){
            if(winner === 'black') turnText.innerText = '🏆 黑方胜！';
            else if(winner === 'white') turnText.innerText = '🏆 白方胜！';
            else turnText.innerText = '平局';
            turnPiece.className = winner==='black'?'piece black':(winner==='white'?'piece white':'piece');
            return;
        }
        if(!gameStarted){
            turnText.innerText = '等待对手...';
            turnPiece.className = 'piece black';
            return;
        }
        if(isMyTurn) {
            turnText.innerText = (currentPlayer==='black'?'黑棋落子':'白棋落子');
            turnPiece.className = currentPlayer==='black'?'piece black':'piece white';
        } else {
            turnText.innerText = '对手思考中...';
            turnPiece.className = currentPlayer==='black'?'piece black':'piece white';
        }
    }

    function tryPlace(row, col, player) {
        if(gameOver) return false;
        if(board[row][col] !== null) return false;
        if(player !== currentPlayer) return false;
        board[row][col] = player;
        historyStack.push({row, col, player});
        const win = checkWin(row, col, player);
        if(win){
            gameOver = true;
            winner = player;
            drawBoard();
            updateUI();
            return true;
        }
        if(isDraw()){
            gameOver = true;
            winner = null;
            drawBoard();
            updateUI();
            return true;
        }
        currentPlayer = (currentPlayer === 'black') ? 'white' : 'black';
        drawBoard();
        updateUI();
        return true;
    }

    function placeAndSync(row, col) {
        if(!gameStarted || gameOver) return false;
        if(!isMyTurn) { infoMsgDiv.innerText = '请等待对方落子'; setTimeout(()=>infoMsgDiv.innerText='',1000); return false; }
        if(board[row][col] !== null) return false;
        if(currentPlayer !== myColor) return false;
        if(tryPlace(row, col, myColor)){
            if(conn && conn.open){
                conn.send({ type: 'move', row, col, player: myColor });
            }
            isMyTurn = false;
            updateUI();
            return true;
        }
        return false;
    }

    function onOpponentMove(row, col, player) {
        if(gameOver) return;
        if(board[row][col] !== null) return;
        if(player !== opponentColor) return;
        if(tryPlace(row, col, player)){
            isMyTurn = true;
            updateUI();
        }
    }

    function resetGame(){
        board = Array(boardSize).fill().map(()=>Array(boardSize).fill(null));
        currentPlayer = 'black';
        gameOver = false;
        winner = null;
        historyStack = [];
        if(gameStarted){
            isMyTurn = (myColor === 'black');
            currentPlayer = 'black';
        }
        drawBoard();
        updateUI();
        if(conn && conn.open) conn.send({ type: 'reset' });
    }

    function setupConnection(connection, myAssignedColor, isCreator){
        conn = connection;
        gameStarted = true;
        myColor = myAssignedColor;
        opponentColor = (myColor === 'black') ? 'white' : 'black';
        isMyTurn = (myColor === 'black');
        currentPlayer = 'black';
        gameOver = false;
        winner = null;
        board = Array(boardSize).fill().map(()=>Array(boardSize).fill(null));
        drawBoard();
        updateUI();
        statusTextSpan.innerText = `✅ 已连接 | 你执 ${myColor==='black'?'黑●':'白○'}`;
        copyIdBtn.style.display = 'none';
        infoMsgDiv.innerText = isMyTurn ? '轮到你了' : '等待对方开局';

        conn.on('data', (data)=>{
            if(data.type === 'move'){
                onOpponentMove(data.row, data.col, data.player);
            }else if(data.type === 'reset'){
                resetGame();
            }
        });
        conn.on('close', ()=>{
            statusTextSpan.innerText = '⚠️ 连接断开';
            gameStarted = false;
            infoMsgDiv.innerText = '对方已离开，刷新页面重连';
            copyIdBtn.style.display = 'none';
        });
    }

    createBtn.onclick = ()=>{
        if(peer) peer.destroy();
        peer = new Peer();
        peer.on('open', id => {
            myId = id;
            statusTextSpan.innerText = `🏠 房间ID: ${id}`;
            copyIdBtn.style.display = 'inline-block';
            infoMsgDiv.innerText = '等待对方连接...';
            peer.on('connection', incomingConn => {
                if(conn) return;
                setupConnection(incomingConn, 'black', true);
            });
        });
        peer.on('error', err => { console.error(err); infoMsgDiv.innerText='创建失败，请刷新重试'; copyIdBtn.style.display = 'none'; });
    };

    connectBtn.onclick = ()=>{
        const targetId = peerIdInput.value.trim();
        if(!targetId) { infoMsgDiv.innerText='请输入对方ID'; return; }
        if(peer) peer.destroy();
        peer = new Peer();
        peer.on('open', ()=>{
            let newConn = peer.connect(targetId);
            newConn.on('open', ()=>{
                setupConnection(newConn, 'white', false);
            });
            newConn.on('error', e=>{ infoMsgDiv.innerText='连接失败，请检查ID'; });
        });
        peer.on('error',()=>{});
    };

    resetLocalBtn.onclick = ()=>{
        if(gameStarted && conn) {
            resetGame();
        } else {
            resetGame();
        }
    };

    // 复制按钮事件
    copyIdBtn.onclick = copyRoomId;

    function handleCanvasClick(e) {
        if(!gameStarted || gameOver || !isMyTurn) return;
        let clientX, clientY;
        if(e.touches){
            e.preventDefault();
            const touch = e.touches[0];
            clientX = touch.clientX;
            clientY = touch.clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        let minDist = cellSize * 0.4;
        let targetRow = -1, targetCol = -1;
        for(let r=0; r<boardSize; r++){
            for(let c=0; c<boardSize; c++){
                const cx = offsetX + c*cellSize, cy = offsetY + r*cellSize;
                const d = Math.hypot(cx-canvasX, cy-canvasY);
                if(d < minDist){ minDist=d; targetRow=r; targetCol=c; }
            }
        }
        if(targetRow!==-1 && board[targetRow][targetCol]===null){
            placeAndSync(targetRow, targetCol);
        }
    }
    canvas.addEventListener('mousedown', handleCanvasClick);
    canvas.addEventListener('touchstart', handleCanvasClick, { passive: false });
    canvas.addEventListener('contextmenu', e=>e.preventDefault());

    canvas.width = 600; canvas.height = 600;
    drawBoard();
    updateUI();
</script>
</body>
</html>
